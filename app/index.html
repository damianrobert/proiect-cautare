<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Search vs Traditional</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .search-container { margin-bottom: 30px; }
        input[type="text"] { width: 50%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        .results-wrapper { display: flex; justify-content: space-around; max-width: 1000px; margin: 0 auto; gap: 20px; }
        .column { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: left; }
        .time { font-size: 14px; color: #666; font-style: italic; margin-bottom: 15px; }
        .result-item { background: #eef2f5; padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 4px solid #007bff; cursor: pointer; transition: background-color 0.2s; }
        .result-item:hover { background-color: #dde3e9; }
        .category-tag { background: #007bff; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-bottom: 8px; display: inline-block; }
        .score-tag { background: #28a745; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 5px; display: inline-block; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 5% auto; padding: 20px; border-radius: 8px; width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        mark { background-color: #ffeb3b; padding: 1px 2px; border-radius: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Comparare: Tradițional vs. Vectorial</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Încearcă să cauți: 'automobil' sau 'pisică'">
        <button onclick="performSearch()">Caută</button>
    </div>

    <div class="results-wrapper">
        <div class="column">
            <h2>Căutare Tradițională (BM25)</h2>
            <div class="time" id="time-trad">Timp execuție: 0 ms</div>
            <div id="results-trad">
                <p>Aici vor apărea rezultatele bazate pe cuvinte cheie.</p>
            </div>
        </div>

        <div class="column">
            <h2>Căutare Vectorială (FAISS)</h2>
            <div class="time" id="time-vect">Timp execuție: 0 ms</div>
            <div id="results-vect">
                <p>Aici vor apărea rezultatele bazate pe sens și context.</p>
            </div>
        </div>
    </div>

    <!-- Modal pentru afișarea documentului complet -->
    <div id="documentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Document</h2>
            <div id="modalCategory"></div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            // Resetăm UI-ul în timpul încărcării
            document.getElementById('results-trad').innerHTML = "<em>Se caută...</em>";
            document.getElementById('results-vect').innerHTML = "<em>Se caută...</em>";

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();

                // Afișăm Tradițional
                document.getElementById('time-trad').innerText = `Timp execuție: ${data.traditional.time_ms} ms`;
                document.getElementById('results-trad').innerHTML = data.traditional.results
                    .map(res => `<div class="result-item" onclick="showDocument(${res.id}, '${query.replace(/'/g, "\\'")}')">
                        <span class="category-tag">${res.category}</span>
                        <div>${res.snippet}</div>
                    </div>`).join('');

                // Afișăm Vectorial
                document.getElementById('time-vect').innerText = `Timp execuție: ${data.vectorial.time_ms} ms`;
                document.getElementById('results-vect').innerHTML = data.vectorial.results
                    .map(res => `<div class="result-item" onclick="showDocument(${res.id}, '${query.replace(/'/g, "\\'")}')">
                        <span class="category-tag">${res.category}</span>
                        <span class="score-tag">Distanță: ${res.distance}</span>
                        <div>${res.snippet}</div>
                    </div>`).join('');

            } catch (error) {
                console.error("Eroare la căutare:", error);
            }
        }

        async function showDocument(docId, query) {
            try {
                const response = await fetch('/api/document', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: docId, query: query })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert('Documentul nu a fost găsit');
                    return;
                }
                
                document.getElementById('modalTitle').innerText = `Document #${data.id}`;
                document.getElementById('modalCategory').innerHTML = `<span class="category-tag">${data.category}</span>`;
                document.getElementById('modalContent').innerHTML = data.full_text;
                document.getElementById('documentModal').style.display = 'block';
                
            } catch (error) {
                console.error("Eroare la încărcarea documentului:", error);
            }
        }

        function closeModal() {
            document.getElementById('documentModal').style.display = 'none';
        }

        // Închide modal-ul dacă se dă click outside
        window.onclick = function(event) {
            const modal = document.getElementById('documentModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
